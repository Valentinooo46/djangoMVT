<!DOCTYPE html>
<html>
<head>
    <title>Видалити вагон</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <div class="alert alert-danger" role="alert">
        <h4 class="alert-heading">Підтвердження видалення</h4>
        <p>Ви впевнені, що хочете видалити вагон <strong>{{ carriage.name }} ({{ carriage.number }})</strong>?</p>
        <hr>
        <p class="mb-0">Ця дія не може бути скасована.</p>
    </div>

    <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Видалити</button>
        <a href="{% url 'carriage_list' %}" class="btn btn-secondary">Скасувати</a>
    </form>
</body>
</html>
